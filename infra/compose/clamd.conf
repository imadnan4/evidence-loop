# B04 scanner-only daemon config. The only listener is the worker-mounted Unix socket.
DatabaseDirectory /var/lib/clamav
LocalSocket /run/clamav/clamd.sock
LocalSocketMode 660
User clamav
Foreground true
LogFile /tmp/clamd.log
LogTime true
MaxThreads 4
MaxQueue 16
StreamMaxLength 52428800
MaxFileSize 52428800
MaxScanSize 104857600
MaxRecursion 16
MaxFiles 10000
MaxScanTime 30000
CommandReadTimeout 10
ReadTimeout 30
